defaultBaseImage: ghcr.io/distroless/static

defaultPlatforms:
  - linux/arm64
  - linux/amd64
builds:
  - id: GopherNet 
    dir: .
    main: main.go
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.BuildSha={{ .Git.FullCommit }}
      - -s -w -X main.BuildTime={{ .Timestamp }}
      - -s -w -X main.Version={{ .Git.Tag }}
