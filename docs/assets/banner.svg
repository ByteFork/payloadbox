<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" width="1280" height="320" role="img" aria-labelledby="title desc">
  <title id="title">PayloadBox</title>
  <desc id="desc">PayloadBox: self-hosted HTTP request inspector.</desc>

  <defs>
    <!-- 135deg-style gradient using the dark UI side panel and request list colors. -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#161b27"/>
      <stop offset="55%" stop-color="#0f1117"/>
      <stop offset="100%" stop-color="#0d1018"/>
    </linearGradient>

    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1c2333" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#161b27" stop-opacity="0.86"/>
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000000" flood-opacity="0.28"/>
    </filter>

    <filter id="logoGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.851 0 0 0 0 0.467 0 0 0 0 0.024 0 0 0 0.55 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1280" height="320" rx="18" fill="url(#bg)"/>

  <!-- Subtle UI silhouettes: narrow menu rail and request-list rows. -->
  <g opacity="0.48" filter="url(#shadow)">
    <rect x="96" y="56" width="54" height="208" rx="12" fill="#0d1018" stroke="rgba(255,255,255,0.05)"/>
    <circle cx="123" cy="86" r="10" fill="#d97706"/>
    <rect x="114" y="124" width="18" height="18" rx="5" fill="#1c2333"/>
    <rect x="114" y="158" width="18" height="18" rx="5" fill="#1c2333"/>
    <rect x="114" y="192" width="18" height="18" rx="5" fill="#1c2333"/>

    <rect x="170" y="56" width="250" height="208" rx="12" fill="url(#panel)" stroke="rgba(255,255,255,0.06)"/>
    <rect x="194" y="82" width="78" height="10" rx="5" fill="#94a3b8" opacity="0.5"/>
    <rect x="194" y="111" width="202" height="1" fill="rgba(255,255,255,0.08)"/>
    <rect x="194" y="130" width="42" height="16" rx="4" fill="rgba(37,99,235,0.18)"/>
    <rect x="248" y="134" width="118" height="8" rx="4" fill="#cbd5e1" opacity="0.42"/>
    <rect x="194" y="164" width="44" height="16" rx="4" fill="rgba(5,150,105,0.18)"/>
    <rect x="250" y="168" width="96" height="8" rx="4" fill="#cbd5e1" opacity="0.36"/>
    <rect x="194" y="198" width="50" height="16" rx="4" fill="rgba(217,119,6,0.18)"/>
    <rect x="256" y="202" width="126" height="8" rx="4" fill="#cbd5e1" opacity="0.3"/>
  </g>

  <g opacity="0.34" filter="url(#shadow)">
    <rect x="884" y="74" width="300" height="172" rx="14" fill="#161b27" stroke="rgba(255,255,255,0.06)"/>
    <rect x="912" y="102" width="58" height="18" rx="4" fill="rgba(5,150,105,0.18)"/>
    <rect x="984" y="107" width="142" height="8" rx="4" fill="#cbd5e1" opacity="0.36"/>
    <rect x="912" y="146" width="224" height="1" fill="rgba(255,255,255,0.08)"/>
    <rect x="912" y="170" width="88" height="9" rx="4" fill="#94a3b8" opacity="0.32"/>
    <rect x="912" y="194" width="196" height="9" rx="4" fill="#94a3b8" opacity="0.24"/>
  </g>

  <!-- Centered logo and text block. -->
  <g filter="url(#logoGlow)" transform="translate(408 100) scale(1.875)">
    <rect width="64" height="64" rx="16" fill="#d97706"/>
    <g transform="translate(12 12) scale(1.666)"
       fill="none" stroke="#ffffff" stroke-width="2"
       stroke-linecap="round" stroke-linejoin="round">
      <path d="M19.07 4.93A10 10 0 0 0 6.99 3.34"/>
      <path d="M4 6h.01"/>
      <path d="M2.29 9.62A10 10 0 1 0 21.31 8.35"/>
      <path d="M16.24 7.76A6 6 0 1 0 8.23 16.67"/>
      <path d="M12 18h.01"/>
      <path d="M17.99 11.66A6 6 0 0 1 15.77 16.67"/>
      <circle cx="12" cy="12" r="2"/>
      <path d="m13.41 10.59 5.66-5.66"/>
    </g>
  </g>

  <text x="552" y="154"
        font-family="Inter, system-ui, -apple-system, Segoe UI, sans-serif"
        font-size="64" font-weight="700"
        fill="#f1f5f9">PayloadBox</text>

  <text x="555" y="194"
        font-family="Inter, system-ui, -apple-system, Segoe UI, sans-serif"
        font-size="22" font-weight="500"
        fill="#94a3b8">Self-hosted HTTP Request Inspector</text>

  <text x="556" y="226"
        font-family="Inter, system-ui, -apple-system, Segoe UI, sans-serif"
        font-size="15" font-weight="500"
        fill="#64748b">Capture, inspect, and stream requests from one static binary</text>
</svg>
