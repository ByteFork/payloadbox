version: "2"
run:
  issues-exit-code: 1
linters:
  default: none
  enable:
    - bodyclose
    - copyloopvar
    - dogsled
    - dupl
    - errcheck
    - errorlint
    - exhaustive
    - funlen
    - gochecknoinits
    - goconst
    - gocritic
    - gocyclo
    - godot
    - goprintffuncname
    - gosec
    - govet
    - ineffassign
    - lll
    - misspell
    - mnd
    - nakedret
    - noctx
    - nolintlint
    - prealloc
    - predeclared
    - revive
    - staticcheck
    - thelper
    - tparallel
    - unconvert
    - unparam
    - unused
    - whitespace
    - wsl_v5
  settings:
    wsl_v5:
      allow-first-in-block: true
      allow-whole-block: false
      branch-max-lines: 2
    dupl:
      threshold: 100
    errcheck:
      check-type-assertions: true
    exhaustive:
      default-signifies-exhaustive: true
    funlen:
      lines: 120
      statements: 60
    goconst:
      min-len: 2
      min-occurrences: 3
    gocritic:
      enabled-tags:
        - diagnostic
        - experimental
        - opinionated
        - performance
        - style
      disabled-checks:
        # unnamedResult forces named returns even when return types already
        # distinguish themselves (e.g., (*httptest.Server, *Server)), producing
        # noisier code for no clarity gain.
        - unnamedResult
    govet:
      enable:
        - nilness
        - shadow
      settings:
        printf:
          funcs:
            - (github.com/golangci/golangci-lint/pkg/logutils.Log).Infof
            - (github.com/golangci/golangci-lint/pkg/logutils.Log).Warnf
            - (github.com/golangci/golangci-lint/pkg/logutils.Log).Errorf
            - (github.com/golangci/golangci-lint/pkg/logutils.Log).Fatalf
    lll:
      line-length: 140
    misspell:
      locale: US
    mnd:
      checks:
        - argument
        - case
        - condition
        - return
      ignored-numbers:
        - "0"
        - "1"
        - "2"
        - "3"
      ignored-functions:
        - strings.SplitN
    nolintlint:
      require-explanation: true
      require-specific: true
      allow-unused: false
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - dupl
          - gocyclo
          - gosec
        path: _test\.go
      - linters:
          - gosec
        text: weak cryptographic primitive
      # G706: logutil.SafeField wraps tainted values before logging; gosec does
      # not recognize custom sanitizer functions, so the taint flow is flagged
      # despite being mitigated.
      - linters:
          - gosec
        text: "G706"
      # G705: Record's response body reflects method/path but is served with
      # Content-Type: text/plain; charset=utf-8, which prevents XSS execution.
      - linters:
          - gosec
        text: "G705"
      - linters:
          - staticcheck
        text: error strings should not be capitalized
    paths:
      - tests
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  fix: false
formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/ByteFork/payloadbox
  exclusions:
    generated: lax
    paths:
      - tests
      - builtin$
      - examples$