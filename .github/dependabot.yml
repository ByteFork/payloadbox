version: 2
updates:
  # Go modules
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      go-minor-and-patch:
        update-types:
          - minor
          - patch

  # GitHub Actions versions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly

  # Docker base images (Dockerfile.goreleaser, Dockerfile.alpine)
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
    target-branch: main
