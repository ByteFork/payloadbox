name: UI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ui-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          package_json_file: ui/package.json
      - uses: actions/setup-node@v6
        with:
          node-version-file: ui/.nvmrc
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml

      - run: pnpm --dir ui install --frozen-lockfile
      - run: pnpm --dir ui check
      - run: pnpm --dir ui lint
      - run: pnpm --dir ui knip
      - run: pnpm --dir ui build

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: pnpm/action-setup@v6
        with:
          package_json_file: ui/package.json
      - uses: actions/setup-node@v6
        with:
          node-version-file: ui/.nvmrc
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml
      - run: pnpm --dir ui install --frozen-lockfile
      - run: pnpm --dir ui build
      - run: go build -o payloadbox .

      - name: Install Playwright Chromium
        run: pnpm --dir ui exec playwright install --with-deps chromium
      - run: pnpm --dir ui exec playwright test

      - if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: ui/playwright-report/
          retention-days: 7
