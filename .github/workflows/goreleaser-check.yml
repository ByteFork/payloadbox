name: GoReleaser Check

on:
  pull_request:
    paths:
      - .goreleaser.yml
      - Dockerfile.*
      - .github/workflows/release.yml
      - .github/workflows/goreleaser-check.yml

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - uses: goreleaser/goreleaser-action@v7
        with:
          version: v2.15.4
          args: check
