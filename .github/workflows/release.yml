name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write    # create GitHub Release
  packages: write    # push images to ghcr.io
  id-token: write    # cosign keyless OIDC

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: ui/.nvmrc
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml

      - name: Build UI bundle (embedded into the Go binary)
        run: |
          pnpm --dir ui install --frozen-lockfile
          pnpm --dir ui build

      - name: Validate goreleaser config
        uses: goreleaser/goreleaser-action@v7
        with:
          version: v2.15.4
          args: check

      - name: Install cyclonedx-gomod
        run: go install github.com/CycloneDX/cyclonedx-gomod/cmd/cyclonedx-gomod@latest

      - name: Generate SBOM
        run: cyclonedx-gomod mod -json -output bom.json
      - uses: sigstore/cosign-installer@v3
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: goreleaser/goreleaser-action@v7
        with:
          version: v2.15.4
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
